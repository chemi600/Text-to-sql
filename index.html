<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Generador SQL</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
    }

    label {
      font-weight: bold;
    }

    textarea {
      width: 100%;
      height: 100px;
      margin-bottom: 15px;
      padding: 8px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }

    .resultado {
      margin-top: 30px;
      padding: 15px;
      border: 1px solid #ccc;
      background: #f9f9f9;
    }

    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>
<body>

  <h2>Generador de SQL</h2>

  <form id="formulario">
    <label>Pregunta:</label>
    <textarea id="pregunta" required></textarea>

    <label>Contexto:</label>
    <textarea id="contexto" required></textarea>

    <button type="submit">Enviar</button>
  </form>

  <div class="resultado" id="resultado" style="display:none;">
    <h3>Resultado</h3>
    <p><strong>Pregunta:</strong></p>
    <pre id="resPregunta"></pre>

    <p><strong>Contexto:</strong></p>
    <pre id="resContexto"></pre>

    <p><strong>SQL:</strong></p>
    <pre id="resSQL"></pre>
  </div>

  <script>
    const form = document.getElementById("formulario");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      const pregunta = document.getElementById("pregunta").value;
      const contexto = document.getElementById("contexto").value;

      try {
        const response = await fetch("http://localhost:8000/predict", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            pregunta: pregunta,
            contexto: contexto
          })
        });

        const data = await response.json();

        document.getElementById("resPregunta").textContent = data.pregunta;
        document.getElementById("resContexto").textContent = data.contexto;
        document.getElementById("resSQL").textContent = data.sql;

        document.getElementById("resultado").style.display = "block";

      } catch (error) {
        alert("Error al conectar con la API");
        console.error(error);
      }
    });
  </script>

</body>
</html>
